<button id="showMore">Show More</button>

    <script>
        const gallery = document.getElementById('gallery');
        const showMoreBtn = document.getElementById('showMore');

        const totalPhotos = 24;
        const batchSize = 8;
        let visibleCount = 0;

        function loadMore() {
            const end = Math.min(visibleCount + batchSize, totalPhotos);

            for (let i = visibleCount + 1; i <= end; i++) {
                const file = String(i).padStart(2, '0') + '.jpg';

                gallery.insertAdjacentHTML('beforeend', `
                    <a href="photography/studio/${file}" data-lightbox="gallery">
                        <img src="photography/studio/${file}" alt="${file}">
                    </a>
                `);
            }

            visibleCount = end;

            if (visibleCount >= totalPhotos) {
                showMoreBtn.style.display = 'none';
            }
        }

        loadMore(); // Initial 8 photos

        showMoreBtn.addEventListener('click', loadMore);
    </script>
